name = "notty"
main = "./server/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"

[[kv_namespaces]]
binding = "NOTTY_KV"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_PREVIEW_NAMESPACE_ID"

[[d1_databases]]
binding = "DB"
database_name = "notty-db"
database_id = "YOUR_D1_DATABASE_ID"

[[durable_objects.bindings]]
name = "NOTE_SYNC"
class_name = "NoteSyncDurableObject"

[[migrations]]
tag = "v1"
new_classes = ["NoteSyncDurableObject"]

[vars]
BETTER_AUTH_URL = "http://localhost:5173"

# Add secrets via: wrangler secret put SECRET_NAME
# Required secrets:
# - BETTER_AUTH_SECRET
# - GOOGLE_CLIENT_ID
# - GOOGLE_CLIENT_SECRET
# - OPENAI_API_KEY
# - SUPERMEMORY_API_KEY
